<!DOCTYPE html>
<html>
<head>
    <title>🌾 Ошибка сервера</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c2c, #2a5a3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .error-container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .error-emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #c62828;
            margin-bottom: 15px;
        }
        p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-emoji">🔧🌾</div>
        <h1>Что-то пошло не так</h1>
        <p>На сервере произошла ошибка. Мы уже знаем о проблеме и скоро её исправим.</p>
        <p style="font-size: 14px; color: #999;">Попробуй обновить страницу через минуту.</p>
        <a href="/" class="btn">← Вернуться на главную</a>
    </div>
</body>
</html>
