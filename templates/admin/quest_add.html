{% extends "base.html" %}
{% block content %}
<div style="background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; max-width: 700px; margin: 0 auto;">
    <h2 style="color: #2e7d32; margin-bottom: 20px;">➕ Добавить задание</h2>
    
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Тип задания:</label>
            <select name="quest_type" id="quest_type" required onchange="toggleSocialFields()" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <option value="daily">📅 Ежедневное</option>
                <option value="weekly">📆 Еженедельное</option>
                <option value="achievement">🏅 Достижение</option>
                <option value="social">📱 Социальное</option>
                <option value="chain">🌽 Цепочка</option>
            </select>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Ключ (уникальный):</label>
            <input type="text" name="quest_key" required placeholder="daily_plant_3" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Название:</label>
            <input type="text" name="name" required placeholder="Посадить 3 овоща" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Описание:</label>
            <textarea name="description" rows="3" placeholder="Описание задания" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;"></textarea>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Цель (количество):</label>
            <input type="number" name="target" required min="1" value="1" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Награда (Coin):</label>
            <input type="number" name="reward" required min="1" value="10" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
        </div>
        
        <!-- Поля для социальных заданий -->
        <div id="social_fields" style="display: none;">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">🔗 Ссылка для выполнения:</label>
                <input type="text" name="verify_url" id="verify_url" placeholder="https://t.me/..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <small style="color: #666;">Ссылка, куда перейдёт пользователь при нажатии "Выполнить"</small>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">💬 Подсказка для пользователя:</label>
                <input type="text" name="input_hint" id="input_hint" placeholder="Например: Ваш ник в Telegram" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <small style="color: #666;">Что нужно ввести пользователю для проверки</small>
            </div>
        </div>
        
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Доп. данные (JSON):</label>
            <textarea name="extra_data" rows="4" placeholder='{"steps": ["carrot", "potato"], "rewards": [10, 20]}' style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: monospace;"></textarea>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" style="background: #4caf50; color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 16px;">✅ Добавить</button>
            <a href="/{{ admin_secret }}/quests" style="background: #999; color: white; padding: 12px 24px; border-radius: 10px; text-decoration: none;">Отмена</a>
        </div>
    </form>
</div>

<script>
function toggleSocialFields() {
    const questType = document.getElementById('quest_type').value;
    const socialFields = document.getElementById('social_fields');
    socialFields.style.display = questType === 'social' ? 'block' : 'none';
}
</script>
{% endblock %}
